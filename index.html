<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrimalGym</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/treino.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="stylesheet" href="css/history.css" />
    <link rel="icon" type="image/png" href="assets/logo/favicon.png" />
  </head>

  <body>
    <main>
      <section id="dashboard">
        <header class="header">
          <img
            src="assets/logo/logoPRIMALGYM.png"
            alt="Logo do PrimalGym"
            class="logo"
          />
        </header>
        <section class="welcome">Olá, Rafael 👋</section>

        <section class="stats">
          <div class="card">
            <p class="card-title">Treinos realizados</p>
            <p class="card-value">27</p>
          </div>

          <div class="card">
            <p class="card-title">Último Treino</p>
            <p class="card-value">Ontem</p>
          </div>

          <div class="card">
            <p class="card-title">Peso corporal</p>
            <p class="card-value">90 kg</p>
          </div>
        </section>

        <section class="actions">
          <button class="btn btn-primary">Iniciar treino</button>
        </section>

        <nav class="navigation">
          <a href="#">Histórico</a>
          <a href="#">Estatísticas</a>
        </nav>
      </section>

      <!-- TELA DE TREINO -->
      <section id="workout">
        <!-- MODAL -->
        <section id="exercise-modal">
          <div class="modal-content">
            <h2>Adicionar exercício</h2>

            <input
              type="text"
              placeholder="Pesquisar exercício..."
              class="search-input"
            />

            <div class="exercise-options"></div>

            <button class="btn btn-primary close-modal">Cancelar</button>
          </div>
        </section>

        <header class="workout-header">
          <button id="back-dashboard" class="back-button">← Dashboard</button>

          <h2>Treino de Hoje</h2>
        </header>
        <h2>Treino de Hoje</h2>

        <p class="timer">00:00:00</p>

        <div class="exercise-list">
          <p>Nenhum exercício adicionado.</p>
        </div>

        <button class="btn btn-primary add-exercise">
          + Adicionar exercício
        </button>

        <button class="btn btn-primary">Finalizar treino</button>
      </section>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/exercises.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
